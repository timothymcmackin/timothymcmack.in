aboutMe:
  headText: "Hi, I'm Tim. I'm a technical writer. Here's what I do:"
  bullets:
    - I explain complicated computer systems, tasks, and concepts in plain language.
    - I build sample applications and implement docs-as-code pipelines.
    - I document AI features and rework docs for consumption by AI agents.
    # - I lead teams of technical writers and work directly with development teams.
  blocks:
    - >
      Here's my <a href="./resume">resume</a> and my <a href="./portfolio">portfolio</a> and you can get in touch on <a href="https://www.linkedin.com/in/timothymcmackin/" target="_blank">LinkedIn</a> or by <a href="mailto:timothymcmackin@gmail.com" rel="nofollow noopener noreferrer">email</a>.

    - >
      I like kite flying and kite-surfing, and I'm proud of being a national champion stunt kite pilot.
      My <a href="https://www.youtube.com/watch?v=lYv6042iTX8&list=PLpDx-rmEnbuxnaXKmQslL_sj66lUKm_16&index=1" target="_blank">Youtube</a> account has my kite videos and I am working on a <a href="https://timothymcmackin.github.io/kite-site/" target="_blank">catalog of my kite collection</a>.
